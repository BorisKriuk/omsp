version: "3.9"

services:
  omsp:
    build:
      context: .
      dockerfile: Dockerfile
    image: omsp:latest
    container_name: omsp
    restart: unless-stopped
    ports:
      - "${OMSP_PORT:-80}:80"
    environment:
      - OMSP_ENV=production
      - OMSP_LOG_LEVEL=INFO
      - OMSP_WORKERS=2
      - OMSP_PORT=80
      - OPENBLAS_CORETYPE=ARMV8
      # If you use an external model cache (EFS / GCS fuse):
      # - OMSP_MODEL_DIR=/mnt/models
    # volumes:
    #   - model-cache:/app/models   # optional: persist across rebuilds
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 4G
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

